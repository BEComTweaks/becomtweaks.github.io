<!doctype html>
<html lang="en">
  <head>
    <meta content="Bedrock Edition Community Tweaks" name="author" />
    <meta
      content="Home page of Bedrock Edition Community Tweaks"
      name="description"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bedrock Edition Community Tweaks</title>
    <link rel="stylesheet" href="theme.css" />
    <link href="icon.png" rel="icon" type="image/x-icon" />
  </head>
  <body>
    <div id="background-container"></div>
    <script src="bg.js"></script>
    <br />
    <div class="image-container">
      <img id="title" alt="BedrockTweaks" src="title.png" />
    </div>
    <div oreui-type="general" oreui-color="dark" class="text">
      <p>
        Welcome to
        <a href="https://becomtweaks.github.io">becomtweaks.github.io</a>, a
        fully open-sourced, updated, cool version of
        <a href="https://bedrocktweaks.net">bedrocktweaks.net</a>
      </p>
      <p>
        Hosted in <a href="https://github.com/YzaBeast1">YzaBeast1</a>'s
        garrage. Themed and animated by
        <a href="https://github.com/NSPC911">NSPC911</a>.
      </p>
    </div>
    <div oreui-type="general" oreui-color="dark" class="text">
      <h3>Pages:</h3>
      <div class="pages">
        <button
          oreui-type="button"
          oreui-color="green"
          class="rpbutton"
          onclick="
            document.location = 'https://becomtweaks.github.io/resource-packs'
          "
        >
          Resource Packs
        </button>
        <button
          oreui-type="button"
          oreui-color="green"
          class="ctbutton"
          onclick="
            document.location = 'https://becomtweaks.github.io/crafting-tweaks'
          "
        >
          Crafting Tweaks
        </button>
        <button
          oreui-type="button"
          oreui-color="green"
          class="bpbutton"
          onclick="
            document.location = 'https://becomtweaks.github.io/behaviour-packs'
          "
        >
          Behaviour Packs
        </button>
        <button
          oreui-type="button"
          oreui-color="green"
          class="docbutton"
          onclick="document.location = 'https://becomtweaks.gitbook.io/docs'"
        >
          Docs
        </button>
        <button
          oreui-type="button"
          oreui-color="green"
          class="discobutton"
          onclick="document.location = 'https://becomtweaks.github.io/discord'"
        >
          Discord
        </button>
      </div>
    </div>
    <div class="half-dark"></div>
    <br />
    <button
      aria-controls="fakeAssistantPanel"
      aria-expanded="false"
      aria-label="Open Merl assistant"
      class="fake-assistant-toggle"
      onclick="toggleFakeAssistantPanel()"
      oreui-color="dark"
      oreui-type="button"
      title="Open Merl assistant"
    >
      <img alt="Merl" class="fake-assistant-toggle-img" src="images/merl.png" />
    </button>
    <div
      aria-hidden="true"
      class="fake-assistant-panel"
      id="fakeAssistantPanel"
      oreui-color="dark"
      oreui-type="general"
    >
      <div class="fake-assistant-header">
        <h3>
          Merl
          <br /><sub>Your helpful AI assistant.</sub>
        </h3>
        <button
          aria-label="Close Merl assistant"
          class="fake-assistant-close"
          onclick="closeFakeAssistantPanel()"
          oreui-color="dark"
          oreui-type="button"
        >
          X
        </button>
      </div>
      <div class="fake-assistant-messages" id="fakeAssistantMessages"></div>
      <div class="fake-assistant-input-row">
        <input
          id="fakeAssistantInput"
          oreui-color="dark"
          oreui-type="input"
          placeholder="Ask anything..."
          type="text"
        />
        <button
          class="fake-assistant-send"
          onclick="sendFakeAssistantMessage()"
          oreui-color="dark"
          oreui-type="button"
        >
          Send
        </button>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
